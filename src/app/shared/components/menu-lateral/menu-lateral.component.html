<mat-sidenav-container style="height: 100vh;">
    <mat-sidenav #drawer mode="over" [opened]="false" [autoFocus]="false" [style.width]="'260px'">
        <mat-nav-list>
            <a mat-list-item (click)="irAlHome()">
                <mat-icon>home</mat-icon>
                <span>Home</span>
            </a>
            <a mat-list-item>
                <mat-icon>settings</mat-icon>
                <span>Administración</span>
            </a>
            <a mat-list-item>
                <mat-icon>assessment</mat-icon>
                <span>Reporte General</span>
            </a>
            <a mat-list-item>
                <mat-icon>grid_view</mat-icon>
                <span>Dashboard</span>
            </a>
        </mat-nav-list>
    </mat-sidenav>
    <mat-sidenav-content>
        <mat-toolbar color="primary">
            <button mat-icon-button (click)="drawer.toggle()">
                <mat-icon>menu</mat-icon>
            </button>
            <span style="margin-left: 8px;">GESTIÓN CONTRATOS</span>
            <span class="mat-toolbar-spacer"></span>
            <div style="display: flex; align-items: center; margin-left: auto;">
                <button mat-button [matMenuTriggerFor]="userMenu">
                    ¡Hola! {{UsuarioActual.NombreCompleto}}
                    <img [src]="UsuarioActual.Foto || 'assets/icons/user.svg'" alt=""
                        class="rounded-circle ms-2" width="32" height="32" style="object-fit: cover;">
                </button>
            </div>
            <mat-menu #userMenu="matMenu">
                <button mat-menu-item (click)="irAPerfil()">
                    <mat-icon>person_outline</mat-icon>
                    <span>Mi Perfil</span>
                </button>
                <button (click)="OnClickLogout()" mat-menu-item>
                    <mat-icon>power_settings_new</mat-icon>
                    <span>Cerrar sesión</span>
                </button>
            </mat-menu>
        </mat-toolbar>
        <div>
            <ng-content select="[Body]"></ng-content>
        </div>
    </mat-sidenav-content>
</mat-sidenav-container>
